name: '[Scheduled] Run all jobs'

# Per-job dry-run defaults live in src/mozilla/jobs.ts; the sibling
# apply-*.yaml workflows are the manual overrides.

on:
  schedule:
    - cron: '0 16 * * 2' # Every Tuesday at 4 PM UTC
  workflow_dispatch:

jobs:
  checks:
    runs-on: 'ubuntu-latest'
    environment: 'Actions'
    name: 'Run figma variable script'
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run all jobs
        uses: './'
        with:
          FIGMA_URL_EXPERIMENTAL_DESKTOP_STYLES: ${{ secrets.FIGMA_URL_EXPERIMENTAL_DESKTOP_STYLES }}
          FIGMA_URL_ANDROID_COMPONENTS: ${{ secrets.FIGMA_URL_ANDROID_COMPONENTS }}
          FIGMA_URL_MOBILE_STYLES: ${{ secrets.FIGMA_URL_MOBILE_STYLES }}
          FIGMA_ACCESS_TOKEN: ${{ secrets.FIGMA_ACCESS_TOKEN }}
          SLACK_WEBHOOK_SUCCESS: ${{ secrets.SLACK_WEBHOOK_SUCCESS }}
          SLACK_WEBHOOK_FAILURE: ${{ secrets.SLACK_WEBHOOK_FAILURE }}
          # TODO: re-enable NOVA_STYLES (drop this line) once the in-flight
          # Firefox token changes have landed.
          ONLY_RUN_JOBS: 'ANDROID_M3_MODES'
