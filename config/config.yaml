# Configuration file for the import

#########################
# Central import config #
#########################

# When encountering a 'color-mix(in srgb, currentColor 7%, transparent)' value, it gets replaced by an actual color
# The source for the currentColor value is the value of the centralCurrentColorAlias
centralCurrentColorAlias: '{Theme$text/color}'
# URL(s) for the central source of the design tokens.
# https:// and file:// schemes are both supported. To validate against a local Firefox
# checkout, point these at file:///.../design-system/{dist,src}/... — the design-system
# `npm run build` regenerates the dist/ JSONs.
centralSource:
  colors: 'file:///Users/yaina/Documents/mozilla/git/firefox/toolkit/themes/shared/design-system/dist/tokens-figma-colors.json'
  primitives: 'file:///Users/yaina/Documents/mozilla/git/firefox/toolkit/themes/shared/design-system/dist/tokens-figma-primitives.json'
  components: 'file:///Users/yaina/Documents/mozilla/git/firefox/toolkit/themes/shared/design-system/dist/tokens-figma-components.json'
  theme: 'file:///Users/yaina/Documents/mozilla/git/firefox/toolkit/themes/shared/design-system/dist/tokens-figma-theme.json'
  designTokens: 'file:///Users/yaina/Documents/mozilla/git/firefox/toolkit/themes/shared/design-system/src/design-tokens.json'

########################
# Android modes config #
########################

android:
  themeCollectionName: 'Color'

